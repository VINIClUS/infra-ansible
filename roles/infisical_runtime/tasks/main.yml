---
- name: Validate Infisical contract variables
  ansible.builtin.assert:
    that:
      - infisical_runtime_project_id | length > 0
      - infisical_runtime_environment | length > 0
      - infisical_runtime_secret_paths is mapping
      - infisical_runtime_secret_paths | length > 0
      - infisical_runtime_required_keys is iterable
    fail_msg: >-
      Infisical project ID, environment, secret paths, and required keys must be
      declared.

- name: Reject legacy static-token contract
  ansible.builtin.assert:
    that:
      - infisical_token_env_var is not defined
      - infisical_project_slug is not defined
    fail_msg: >-
      Static token and project slug variables are no longer supported. Use the
      Universal Auth launcher with infisical_project_id.

- name: Record redacted Infisical validation summary
  ansible.builtin.set_fact:
    infisical_runtime_contract_summary:
      project_id_configured: "{{ infisical_runtime_project_id | length > 0 }}"
      environment: "{{ infisical_runtime_environment }}"
      path_count: "{{ infisical_runtime_secret_paths | length }}"
      required_key_count: "{{ infisical_runtime_required_keys | length }}"
      authentication: universal-auth
