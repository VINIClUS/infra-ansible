---
- name: Validate Infisical contract variables
  ansible.builtin.assert:
    that:
      - infisical_runtime_project_slug | length > 0
      - infisical_runtime_environment | length > 0
      - infisical_runtime_secret_paths is mapping
      - infisical_runtime_secret_paths | length > 0
      - infisical_runtime_required_keys is iterable
    fail_msg: >-
      Infisical project, environment, secret paths, and required keys must be
      declared.

- name: Validate Infisical token presence when access check is enabled
  ansible.builtin.assert:
    that:
      - >-
        lookup('ansible.builtin.env', infisical_runtime_token_env_var) |
        length > 0
    fail_msg: >-
      Infisical token environment variable is required for live access
      validation.
  no_log: true
  when: infisical_runtime_validate_access | bool

- name: Record redacted Infisical validation summary
  ansible.builtin.set_fact:
    infisical_runtime_contract_summary:
      project: "{{ infisical_runtime_project_slug }}"
      environment: "{{ infisical_runtime_environment }}"
      path_count: "{{ infisical_runtime_secret_paths | length }}"
      required_key_count: "{{ infisical_runtime_required_keys | length }}"
      live_validation_enabled: "{{ infisical_runtime_validate_access | bool }}"
