---
- name: Validate path-scoped Cloudflare Access contract
  ansible.builtin.assert:
    that:
      - cloudflare_access_api_base_url == 'https://api.cloudflare.com/client/v4'
      - >-
        (cloudflare_access_account_id | length > 0) !=
        (cloudflare_access_zone_id | length > 0)
      - cloudflare_access_api_token | length > 0
      - cloudflare_access_service_token_id | length > 0
      - cloudflare_access_human_domain == 'ansible.vinisantana.com'
      - >-
        cloudflare_access_health_domain ==
        'ansible.vinisantana.com/api/ping'
      - cloudflare_access_allowed_email == 'me@vinisantana.com'
      - cloudflare_access_session_duration == '24h'
      - >-
        cloudflare_access_human_application_name ==
        'Semaphore human OTP access'
      - >-
        cloudflare_access_health_application_name ==
        'Semaphore health service access'
      - >-
        cloudflare_access_human_policy_name ==
        'Allow exact Semaphore operator email'
      - >-
        cloudflare_access_health_policy_name ==
        'Allow exact Semaphore health token'
      - cloudflare_access_applications | length == 2
      - >-
        cloudflare_access_applications | map(attribute='key') | list ==
        ['human', 'health']
      - >-
        cloudflare_access_applications | map(attribute='type') |
        unique | list == ['self_hosted']
      - >-
        cloudflare_access_applications | map(attribute='name') | list ==
        ['Semaphore human OTP access',
        'Semaphore health service access']
      - >-
        cloudflare_access_applications | map(attribute='domain') | list ==
        ['ansible.vinisantana.com',
        'ansible.vinisantana.com/api/ping']
      - >-
        cloudflare_access_applications |
        map(attribute='session_duration') | list == ['24h', '24h']
      - >-
        cloudflare_access_applications[0].keys() | list | sort ==
        ['domain', 'key', 'name', 'policy', 'session_duration', 'type']
      - >-
        cloudflare_access_applications[1].keys() | list | sort ==
        ['domain', 'key', 'name', 'policy', 'session_duration', 'type']
      - >-
        cloudflare_access_applications[0].policy.keys() | list | sort ==
        ['decision', 'exclude', 'include', 'name', 'precedence', 'require']
      - >-
        cloudflare_access_applications[1].policy.keys() | list | sort ==
        ['decision', 'exclude', 'include', 'name', 'precedence', 'require']
      - >-
        cloudflare_access_applications[0].policy.name ==
        'Allow exact Semaphore operator email'
      - cloudflare_access_applications[0].policy.decision == 'allow'
      - >-
        cloudflare_access_applications[0].policy.include ==
        [{'email': {'email': cloudflare_access_allowed_email}}]
      - cloudflare_access_applications[0].policy.exclude == []
      - cloudflare_access_applications[0].policy.require == []
      - cloudflare_access_applications[0].policy.precedence | int == 1
      - >-
        cloudflare_access_applications[1].policy.name ==
        'Allow exact Semaphore health token'
      - >-
        cloudflare_access_applications[1].policy.decision ==
        'non_identity'
      - >-
        cloudflare_access_applications[1].policy.include ==
        [{'service_token': {'token_id':
        cloudflare_access_service_token_id}}]
      - cloudflare_access_applications[1].policy.exclude == []
      - cloudflare_access_applications[1].policy.require == []
      - cloudflare_access_applications[1].policy.precedence | int == 1
    fail_msg: >-
      Cloudflare Access requires exactly one account or zone scope, an API
      token, the exact Semaphore domains and operator email, and one exact
      health service-token resource ID.
  no_log: true
  tags: [cloudflare_access_application_validate]

- name: Select Cloudflare Access API scope
  ansible.builtin.set_fact:
    cloudflare_access_application_scope_url: >-
      {{ cloudflare_access_api_base_url }}/{{
         'accounts' if cloudflare_access_account_id | length > 0 else 'zones'
      }}/{{ cloudflare_access_account_id
            if cloudflare_access_account_id | length > 0
            else cloudflare_access_zone_id }}
  no_log: true

- name: List configured Cloudflare Access identity providers
  ansible.builtin.uri:
    url: >-
      {{ cloudflare_access_application_scope_url
      }}/access/identity_providers?per_page=100
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_access_api_token }}"
    status_code: 200
    return_content: false
  register: cloudflare_access_application_identity_provider_list
  changed_when: false
  failed_when: >-
    cloudflare_access_application_identity_provider_list.json.success |
    default(false) != true
  no_log: true

- name: Select the exact One-Time PIN identity provider
  ansible.builtin.include_tasks: identity_provider.yml
  vars:
    cloudflare_access_identity_provider_candidates: >-
      {{ cloudflare_access_application_identity_provider_list.json.result }}
  no_log: true

- name: List exact Cloudflare Access application domains
  ansible.builtin.uri:
    url: >-
      {{ cloudflare_access_application_scope_url }}/access/apps?domain={{
         item.domain | urlencode }}&exact=true&per_page=100
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_access_api_token }}"
    status_code: 200
    return_content: false
  loop: "{{ cloudflare_access_applications }}"
  loop_control:
    label: "{{ item.key }}"
  register: cloudflare_access_application_list
  changed_when: false
  failed_when: >-
    cloudflare_access_application_list.json.success | default(false) != true
  no_log: true

- name: Reject duplicate exact Cloudflare Access application domains
  ansible.builtin.assert:
    that:
      - >-
        item.json.result |
        selectattr('domain', 'equalto', item.item.domain) |
        list | length <= 1
    fail_msg: >-
      More than one Cloudflare Access application has the exact managed
      domain; refusing an ambiguous update.
  loop: "{{ cloudflare_access_application_list.results }}"
  loop_control:
    label: "{{ item.item.key }}"
  no_log: true

- name: Initialize managed Cloudflare Access application IDs
  ansible.builtin.set_fact:
    cloudflare_access_application_ids: {}
  no_log: true

- name: Record existing Cloudflare Access application IDs
  ansible.builtin.set_fact:
    cloudflare_access_application_ids: >-
      {{ cloudflare_access_application_ids | combine({
           item.item.key: (
             item.json.result |
             selectattr('domain', 'equalto', item.item.domain) |
             map(attribute='id') | first
           ) | default('')
         }) }}
  loop: "{{ cloudflare_access_application_list.results }}"
  loop_control:
    label: "{{ item.item.key }}"
  no_log: true

- name: Update drifted Cloudflare Access applications by exact domain
  ansible.builtin.uri:
    url: >-
      {{ cloudflare_access_application_scope_url }}/access/apps/{{
         cloudflare_access_application_ids[item.item.key] }}
    method: PUT
    headers:
      Authorization: "Bearer {{ cloudflare_access_api_token }}"
    body_format: json
    body: >-
      {{ {'name': item.item.name,
          'domain': item.item.domain,
          'type': item.item.type,
          'session_duration': item.item.session_duration} |
         combine(
           {'allowed_idps':
              [cloudflare_access_application_otp_identity_provider_id],
            'auto_redirect_to_identity': true}
           if item.item.key == 'human' else {}
         ) }}
    status_code: 200
    return_content: false
  vars:
    cloudflare_access_current_application: >-
      {{ item.json.result |
         selectattr('domain', 'equalto', item.item.domain) | first }}
  loop: "{{ cloudflare_access_application_list.results }}"
  loop_control:
    label: "{{ item.item.key }}"
  when:
    - cloudflare_access_application_ids[item.item.key] | length > 0
    - >-
      cloudflare_access_current_application.name != item.item.name or
      cloudflare_access_current_application.domain != item.item.domain or
      cloudflare_access_current_application.type != item.item.type or
      cloudflare_access_current_application.session_duration |
      default('') != item.item.session_duration or
      (item.item.key == 'human' and
       (cloudflare_access_current_application.allowed_idps | default([]) !=
        [cloudflare_access_application_otp_identity_provider_id] or
        not (cloudflare_access_current_application.auto_redirect_to_identity |
             default(false) | bool)))
  register: cloudflare_access_application_updates
  changed_when: true
  failed_when: >-
    cloudflare_access_application_updates.json.success |
    default(false) != true
  no_log: true

- name: Create missing Cloudflare Access applications
  ansible.builtin.uri:
    url: "{{ cloudflare_access_application_scope_url }}/access/apps"
    method: POST
    headers:
      Authorization: "Bearer {{ cloudflare_access_api_token }}"
    body_format: json
    body: >-
      {{ {'name': item.item.name,
          'domain': item.item.domain,
          'type': item.item.type,
          'session_duration': item.item.session_duration} |
         combine(
           {'allowed_idps':
              [cloudflare_access_application_otp_identity_provider_id],
            'auto_redirect_to_identity': true}
           if item.item.key == 'human' else {}
         ) }}
    status_code: 200
    return_content: false
  loop: "{{ cloudflare_access_application_list.results }}"
  loop_control:
    label: "{{ item.item.key }}"
  when: cloudflare_access_application_ids[item.item.key] | length == 0
  register: cloudflare_access_application_creates
  changed_when: true
  failed_when: >-
    cloudflare_access_application_creates.json.success |
    default(false) != true
  no_log: true

- name: Record created Cloudflare Access application IDs
  ansible.builtin.set_fact:
    cloudflare_access_application_ids: >-
      {{ cloudflare_access_application_ids | combine({
           item.item.item.key: item.json.result.id
         }) }}
  loop: "{{ cloudflare_access_application_creates.results }}"
  loop_control:
    label: "{{ item.item.item.key }}"
  when: not item.skipped | default(false)
  no_log: true

- name: List policies for managed Cloudflare Access applications
  ansible.builtin.uri:
    url: >-
      {{ cloudflare_access_application_scope_url }}/access/apps/{{
         cloudflare_access_application_ids[item.key] }}/policies?per_page=100
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_access_api_token }}"
    status_code: 200
    return_content: false
  loop: "{{ cloudflare_access_applications }}"
  loop_control:
    label: "{{ item.key }}"
  register: cloudflare_access_policy_list  # noqa var-naming[no-role-prefix]
  changed_when: false
  failed_when: >-
    cloudflare_access_policy_list.json.success | default(false) != true
  no_log: true

- name: Reject duplicate exact Cloudflare Access policy names
  ansible.builtin.assert:
    that:
      - >-
        item.json.result |
        selectattr('name', 'equalto', item.item.policy.name) |
        list | length <= 1
    fail_msg: >-
      More than one Cloudflare Access policy has the exact managed name in
      its application; refusing an ambiguous update.
  loop: "{{ cloudflare_access_policy_list.results }}"
  loop_control:
    label: "{{ item.item.key }}"
  no_log: true

- name: Initialize managed Cloudflare Access policy IDs
  ansible.builtin.set_fact:
    cloudflare_access_application_policy_ids: {}
  no_log: true

- name: Record existing Cloudflare Access policy IDs
  ansible.builtin.set_fact:
    cloudflare_access_application_policy_ids: >-
      {{ cloudflare_access_application_policy_ids | combine({
           item.item.key: (
             item.json.result |
             selectattr('name', 'equalto', item.item.policy.name) |
             map(attribute='id') | first
           ) | default('')
         }) }}
  loop: "{{ cloudflare_access_policy_list.results }}"
  loop_control:
    label: "{{ item.item.key }}"
  no_log: true

- name: Update drifted Cloudflare Access policies by exact name
  ansible.builtin.uri:
    url: >-
      {{ cloudflare_access_application_scope_url }}/access/apps/{{
         cloudflare_access_application_ids[item.item.key] }}/policies/{{
         cloudflare_access_application_policy_ids[item.item.key] }}
    method: PUT
    headers:
      Authorization: "Bearer {{ cloudflare_access_api_token }}"
    body_format: json
    body: "{{ item.item.policy }}"
    status_code: 200
    return_content: false
  vars:
    cloudflare_access_current_policy: >-
      {{ item.json.result |
         selectattr('name', 'equalto', item.item.policy.name) | first }}
  loop: "{{ cloudflare_access_policy_list.results }}"
  loop_control:
    label: "{{ item.item.key }}"
  when:
    - cloudflare_access_application_policy_ids[item.item.key] | length > 0
    - >-
      cloudflare_access_current_policy.decision !=
      item.item.policy.decision or
      cloudflare_access_current_policy.include | default([]) !=
      item.item.policy.include or
      cloudflare_access_current_policy.exclude | default([]) !=
      item.item.policy.exclude or
      cloudflare_access_current_policy.require | default([]) !=
      item.item.policy.require or
      cloudflare_access_current_policy.precedence | int !=
      item.item.policy.precedence | int
  register: cloudflare_access_policy_updates  # noqa var-naming[no-role-prefix]
  changed_when: true
  failed_when: >-
    cloudflare_access_policy_updates.json.success | default(false) != true
  no_log: true

- name: Create missing Cloudflare Access policies
  ansible.builtin.uri:
    url: >-
      {{ cloudflare_access_application_scope_url }}/access/apps/{{
         cloudflare_access_application_ids[item.item.key] }}/policies
    method: POST
    headers:
      Authorization: "Bearer {{ cloudflare_access_api_token }}"
    body_format: json
    body: "{{ item.item.policy }}"
    status_code: 200
    return_content: false
  loop: "{{ cloudflare_access_policy_list.results }}"
  loop_control:
    label: "{{ item.item.key }}"
  when: cloudflare_access_application_policy_ids[item.item.key] | length == 0
  register: cloudflare_access_policy_creates  # noqa var-naming[no-role-prefix]
  changed_when: true
  failed_when: >-
    cloudflare_access_policy_creates.json.success | default(false) != true
  no_log: true

- name: Record created Cloudflare Access policy IDs
  ansible.builtin.set_fact:
    cloudflare_access_application_policy_ids: >-
      {{ cloudflare_access_application_policy_ids | combine({
           item.item.item.key: item.json.result.id
         }) }}
  loop: "{{ cloudflare_access_policy_creates.results }}"
  loop_control:
    label: "{{ item.item.item.key }}"
  when: not item.skipped | default(false)
  no_log: true
