---
- name: Install Semaphore and PostgreSQL native dependencies
  ansible.builtin.apt:
    name: "{{ semaphore_controller_packages }}"
    state: present
    update_cache: true
  become: true

- name: Create dedicated Semaphore group
  ansible.builtin.group:
    name: "{{ semaphore_controller_group }}"
    system: true
    state: present
  become: true

- name: Create dedicated Semaphore user
  ansible.builtin.user:
    name: "{{ semaphore_controller_user }}"
    group: "{{ semaphore_controller_group }}"
    home: "{{ semaphore_controller_state_dir }}"
    shell: /usr/sbin/nologin
    create_home: false
    system: true
    state: present
  become: true

- name: Create persistent Semaphore directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ semaphore_controller_release_root }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ semaphore_controller_release_path }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ semaphore_controller_cache_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ semaphore_controller_config_dir }}"
      owner: root
      group: "{{ semaphore_controller_group }}"
      mode: "0750"
    - path: "{{ semaphore_controller_state_dir }}"
      owner: "{{ semaphore_controller_user }}"
      group: "{{ semaphore_controller_group }}"
      mode: "0750"
    - path: "{{ semaphore_controller_tmp_dir }}"
      owner: "{{ semaphore_controller_user }}"
      group: "{{ semaphore_controller_group }}"
      mode: "0700"
    - path: "{{ semaphore_controller_setup_state_dir }}"
      owner: root
      group: postgres
      mode: "0710"
  become: true

- name: Download exact official Semaphore package
  ansible.builtin.get_url:
    url: "https://github.com/semaphoreui/semaphore/releases/download/\
      v2.18.25/semaphore_2.18.25_linux_amd64.deb"
    dest: "{{ semaphore_controller_download_path }}"
    owner: root
    group: root
    mode: "0644"
    checksum: "sha256:209cf89c23710ed74e4568be129690fb5\
      f9599b66f3cdfb55ed6c1a437c94dc9"
  become: true

- name: Extract immutable Semaphore release
  ansible.builtin.command:
    argv:
      - dpkg-deb
      - --extract
      - "{{ semaphore_controller_download_path }}"
      - "{{ semaphore_controller_release_path }}"
  args:
    creates: "{{ semaphore_controller_release_path }}/usr/bin/semaphore"
  become: true
