---
- name: Validate MinIO contract variables
  ansible.builtin.assert:
    that:
      - minio_artifacts_endpoint_url | length > 0
      - minio_artifacts_region | length > 0
      - minio_artifacts_buckets is mapping
      - minio_artifacts_buckets.artifacts is defined
      - minio_artifacts_buckets.backups is defined
      - minio_artifacts_buckets.validation is defined
    fail_msg: >-
      MinIO endpoint, region, and artifacts/backups/validation buckets must be
      declared.

- name: Validate MinIO credentials presence when access check is enabled
  ansible.builtin.assert:
    that:
      - >-
        lookup('ansible.builtin.env', minio_artifacts_access_key_env_var) |
        length > 0
      - >-
        lookup('ansible.builtin.env', minio_artifacts_secret_key_env_var) |
        length > 0
    fail_msg: >-
      MinIO credential environment variables are required for live access
      validation.
  no_log: true
  when: minio_artifacts_validate_access | bool

- name: Read MinIO bucket inventory
  amazon.aws.s3_bucket_info:
    endpoint_url: "{{ minio_artifacts_endpoint_url }}"
    region: "{{ minio_artifacts_region }}"
    access_key: >-
      {{ lookup('ansible.builtin.env', minio_artifacts_access_key_env_var) }}
    secret_key: >-
      {{ lookup('ansible.builtin.env', minio_artifacts_secret_key_env_var) }}
  register: minio_artifacts_bucket_info
  changed_when: false
  no_log: true
  when: minio_artifacts_validate_access | bool

- name: Validate declared MinIO buckets are accessible
  ansible.builtin.assert:
    that:
      - >-
        minio_artifacts_buckets.values() |
        difference(minio_artifacts_bucket_info.buckets | map(attribute='name')) |
        length == 0
    fail_msg: One or more declared MinIO buckets are missing or inaccessible.
  when: minio_artifacts_validate_access | bool

- name: Record redacted MinIO validation summary
  ansible.builtin.set_fact:
    minio_artifacts_contract_summary:
      endpoint_configured: "{{ minio_artifacts_endpoint_url | length > 0 }}"
      region: "{{ minio_artifacts_region }}"
      bucket_count: "{{ minio_artifacts_buckets | length }}"
      live_validation_enabled: "{{ minio_artifacts_validate_access | bool }}"
      publish_validation_report: >-
        {{ minio_artifacts_publish_validation_report | bool }}
